<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, orderBy, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ============================================
  // REPLACE WITH YOUR FIREBASE CONFIG
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAtzCy0CzlheMJJhGCdHdwGg9CDP6KQQg4",
    authDomain: "clutchzone-de519.firebaseapp.com",
    projectId: "clutchzone-de519",
    storageBucket: "clutchzone-de519.firebasestorage.app",
    messagingSenderId: "753147427268",
    appId: "1:753147427268:web:3b86fed888fe9d608ccc91"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // OWNER CONFIG
  const OWNER_WHATSAPP = "923270617401";
  const OWNER_EMAIL = "clutchzone.pk@gmail.com";

  // EMAILJS CONFIG - replace after EmailJS setup
  const EMAILJS_SERVICE = "service_9f0o5wk";
  const EMAILJS_TEMPLATE = "template_egd2pj4";
  const EMAILJS_KEY = "s_xVQhU8z-kjJIbhh";

  let currentUser = null;
  let currentProfile = null;

  // ============= AUTH =============
  window.loginWithGoogle = async () => { // FIXED
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      const profileRef = doc(db, "players", user.uid);
      const snap = await getDoc(profileRef);
      if (!snap.exists()) {
        showPage('setup');
      }
    } catch (e) {
      showToast("❌ Login failed: " + e.message);
    }
  };

  window.logoutUser = async () => {
    await signOut(auth);
    currentUser = null;
    currentProfile = null;
    window._currentProfile = null;
    showPage('home');
    updateNavState();
    updateHomeButtons(false);
    showToast("👋 Logged out!");
  };

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      const snap = await getDoc(doc(db, "players", user.uid));
      if (snap.exists()) {
        currentProfile = snap.data();
        window._currentProfile = currentProfile;
        window._globalProfile = currentProfile;
        hideModal('login-modal');
        updateNavState();
        updateHomeButtons(true);
        refreshProfilePage();
        refreshWalletPage();
      } else {
        showPage('setup');
      }
    } else {
      window._currentProfile = null;
      updateNavState();
      updateHomeButtons(false);
    }
  });

  // ============= PROFILE SETUP =============
  window.submitProfile = async () => {
    if (!currentUser) return;
    const name = document.getElementById('setup-name').value.trim();
    const whatsapp = document.getElementById('setup-whatsapp').value.trim();
    const uid = document.getElementById('setup-uid').value.trim();
    const method = document.getElementById('setup-method').value;
    const accountNo = document.getElementById('setup-account').value.trim();

    if (!name || !whatsapp || !uid || !method || !accountNo) {
      showToast("❌ Please fill all fields!"); return;
    }

    // Check UID uniqueness
    const uidQuery = query(collection(db, "players"));
    const allPlayers = await getDocs(uidQuery);
    let uidTaken = false;
    allPlayers.forEach(d => { if (d.data().gameUID === uid && d.id !== currentUser.uid) uidTaken = true; });
    if (uidTaken) { showToast("❌ This UID is already registered!"); return; }

    const profileData = {
      name,
      whatsapp,
      gameUID: uid,
      paymentMethod: method,
      paymentAccount: accountNo,
      email: currentUser.email,
      photo: currentUser.photoURL || "",
      walletBalance: 0,
      totalEarnings: 0,
      tournamentsPlayed: 0,
      tournamentsWon: 0,
      totalKills: 0,
      createdAt: serverTimestamp()
    };

    await setDoc(doc(db, "players", currentUser.uid), profileData);
    currentProfile = profileData;
    window._currentProfile = profileData;
    window._globalProfile = profileData;
    updateNavState();
    updateHomeButtons(true);
    refreshProfilePage();
    refreshWalletPage();
    showPage('home');
    showToast("✅ Profile created! Welcome to Clutch Zone!");
  };

  // ============= WALLET =============
  window.openDepositWhatsapp = () => {
    if (!currentProfile) { showToast("❌ Please login first!"); return; }
    const amount = document.getElementById('deposit-amount-input').value || "_";
    const msg = Hi, I want to deposit *Rs ${amount}* in my Clutch Zone wallet.%0APlayer ID: *${currentProfile.gameUID}*%0AName: *${currentProfile.name}*;
    window.open(https://wa.me/${OWNER_WHATSAPP}?text=${msg}, '_blank');
    hideModal('deposit-modal');
  };

  window.submitWithdraw = async () => {
    if (!currentProfile) return;
    const amount = parseInt(document.getElementById('withdraw-amount-input').value);
    if (!amount || amount < 500) { showToast("❌ Minimum withdrawal is Rs 500!"); return; }
    if (amount > currentProfile.walletBalance) { showToast("❌ Insufficient balance!"); return; }

    // Save request to Firebase
    await addDoc(collection(db, "withdrawalRequests"), {
      playerUID: currentProfile.gameUID,
      playerName: currentProfile.name,
      playerWhatsapp: currentProfile.whatsapp,
      paymentMethod: currentProfile.paymentMethod,
      paymentAccount: currentProfile.paymentAccount,
      amount,
      status: "pending",
      timestamp: serverTimestamp()
    });

    // Send Email via EmailJS
    if (window.emailjs) {
      emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        to_email: OWNER_EMAIL,
        player_name: currentProfile.name,
        player_uid: currentProfile.gameUID,
        player_whatsapp: currentProfile.whatsapp,
        payment_method: currentProfile.paymentMethod,
        payment_account: currentProfile.paymentAccount,
        amount: amount
      }, EMAILJS_KEY);
    }

    // WhatsApp notification to owner
    const msg = 🔔 *Withdrawal Request*%0APlayer: *${currentProfile.name}*%0AUID: *${currentProfile.gameUID}*%0AAmount: *Rs ${amount}*%0AMethod: *${currentProfile.paymentMethod}*%0AAccount: *${currentProfile.paymentAccount}*;
    window.open(https://wa.me/${OWNER_WHATSAPP}?text=${msg}, '_blank');

    hideModal('withdraw-modal');
    showModal('withdraw-success-modal');
  };

  // ============= TOURNAMENT JOIN =============
  window.joinTournament = async (tournamentId, entryFee, tournamentName) => {
    const profile = currentProfile || window._globalProfile;
    if (!profile) { showToast("❌ Please login first!"); showModal('login-prompt-modal'); return; }
    if (profile.walletBalance < entryFee) {
      showToast("❌ Insufficient balance! Please deposit first.");
      return;
    }

    // Deduct entry fee
    const newBalance = profile.walletBalance - entryFee;
    await updateDoc(doc(db, "players", currentUser.uid), { 
      walletBalance: newBalance,
      tournamentsPlayed: (profile.tournamentsPlayed || 0) + 1
    });

    // Add to tournament participants
    await addDoc(collection(db, "tournaments", tournamentId, "participants"), {
      playerUID: profile.gameUID,
      playerName: profile.name,
      playerWhatsapp: profile.whatsapp,
      joinedAt: serverTimestamp()
    });

    // Add transaction
    await addDoc(collection(db, "players", currentUser.uid, "transactions"), {
      type: "entry_fee",
      description: Entry Fee - ${tournamentName},
      amount: -entryFee,
      timestamp: serverTimestamp()
    });

    // Notify owner on WhatsApp
    const ownerMsg = 🎮 *New Tournament Join!*%0ATournament: *${tournamentName}*%0APlayer: *${profile.name}*%0AUID: *${profile.gameUID}*%0AWhatsApp: *${profile.whatsapp}*%0AEntry Fee: *Rs ${entryFee}*;
    window.open(https://wa.me/${OWNER_WHATSAPP}?text=${ownerMsg}, '_blank');

    if (currentProfile) currentProfile.walletBalance = newBalance;
    if (window._globalProfile) window._globalProfile.walletBalance = newBalance;
    if (window._currentProfile) window._currentProfile.walletBalance = newBalance;
    refreshWalletPage();
    hideModal('join-confirm-modal');
    showToast("🎮 Joined! Room ID will be sent on WhatsApp before match!");
  };

  // ============= LEADERBOARD =============
  window.loadLeaderboard = async () => {
    const lb = document.getElementById('leaderboard-list');
    lb.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-dim)">Loading...</div>';
    try {
      const snap = await getDocs(query(collection(db, "players"), orderBy("totalEarnings", "desc")));
      const players = [];
      snap.forEach(d => players.push(d.data()));
      renderLeaderboard(players);
    } catch(e) {
      lb.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-dim)">Could not load leaderboard.</div>';
    }
  };

  function renderLeaderboard(players) {
    const lb = document.getElementById('leaderboard-list');
    if (players.length === 0) { lb.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-dim)">No players yet!</div>'; return; }
    lb.innerHTML = players.map((p, i) => {
      if (i === 0) return `
        <div class="rank1-card">
          <div class="crown">👑</div>
          <div class="rank-avatar">${p.photo ? <img src="${p.photo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover"> : '👤'}</div>
          <div class="rank-num">#1</div>
          <div class="rank-name">${p.name}</div>
          <div class="rank-uid">UID: ${p.gameUID}</div>
          <div class="rank-prize">Rs ${(p.totalEarnings||0).toLocaleString()}</div>
          <div class="rank-stats"><span>🏆 ${p.tournamentsWon||0} wins</span><span>🎮 ${p.tournamentsPlayed||0} played</span></div>
        </div>`;
      const medal = i === 1 ? '🥈' : i === 2 ? '🥉' : #${i+1};
      return `
        <div class="rank-row">
          <div class="rank-row-num">${medal}</div>
          <div class="rank-row-avatar">${p.photo ? <img src="${p.photo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover"> : '👤'}</div>
          <div class="rank-row-info">
            <div class="rank-row-name">${p.name}</div>
            <div class="rank-row-sub">🏆 ${p.tournamentsWon||0} wins • 🎮 ${p.tournamentsPlayed||0} played</div>
          </div>
          <div class="rank-row-prize">Rs ${(p.totalEarnings||0).toLocaleString()}</div>
        </div>`;
    }).join('');
  }

  // ============= HELPERS =============
  function updateNavState() {
    const loggedIn = !!currentProfile;
    document.getElementById('nav-login-btn').style.display = loggedIn ? 'none' : 'flex';
    document.getElementById('nav-logout-btn').style.display = loggedIn ? 'flex' : 'none';
    document.getElementById('nav-profile').style.display = loggedIn ? 'flex' : 'none';
  }

  window.updateHomeButtons = function(loggedIn) {
    const startBtn = document.getElementById('home-start-btn');
    const loginBtn = document.getElementById('home-login-btn');
    if (startBtn) startBtn.style.display = 'flex';
    if (loginBtn) loginBtn.style.display = loggedIn ? 'none' : 'flex';
  };

  function refreshProfilePage() {
    if (!currentProfile) return;
    document.getElementById('profile-photo').innerHTML = currentProfile.photo ? <img src="${currentProfile.photo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover"> : '👤';
    document.getElementById('profile-name-display').textContent = currentProfile.name;
    document.getElementById('profile-uid-display').textContent = 'UID: ' + currentProfile.gameUID;
    document.getElementById('profile-email-display').textContent = currentProfile.email;
    document.getElementById('profile-method-display').textContent = currentProfile.paymentMethod + ': ' + currentProfile.paymentAccount;
    document.getElementById('profile-earnings').textContent = 'Rs ' + (currentProfile.totalEarnings||0).toLocaleString();
    document.getElementById('profile-won').textContent = currentProfile.tournamentsWon || 0;
    document.getElementById('profile-played').textContent = currentProfile.tournamentsPlayed || 0;
    document.getElementById('profile-kills').textContent = currentProfile.totalKills || 0;
  }

  function refreshWalletPage() {
    if (!currentProfile) return;
    const bal = currentProfile.walletBalance || 0;
    document.getElementById('wallet-balance').textContent = 'Rs ' + bal.toLocaleString();
    document.getElementById('withdraw-balance-note').textContent = 'Your balance: Rs ' + bal.toLocaleString();
  }

  window._firebaseReady = { joinTournament, loadLeaderboard };
</script>
